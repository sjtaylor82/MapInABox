name: Build and release Windows / macOS

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

concurrency:
  group: build-artifacts-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    timeout-minutes: 120

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: .github/workflows/publish-release.yml

      - name: Install build tools
        shell: powershell
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install pyinstaller wxPython numpy pandas Pillow pygame shapely h3 pyarrow timezonefinder pycountry accessible-output2 google-genai google-api-core proto-plus
          choco install innosetup -y --no-progress

      - name: Build Windows installer
        shell: powershell
        run: |
          python build.py install

      - name: Upload Windows installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: MapInABox-Windows
          path: installer/*.exe
          if-no-files-found: error

  build-macos:
    runs-on: macos-14
    timeout-minutes: 120

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: .github/workflows/publish-release.yml

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install \
            pyinstaller \
            wxPython \
            numpy \
            pandas \
            Pillow \
            pygame \
            shapely \
            h3 \
            pyarrow \
            timezonefinder \
            pycountry \
            accessible-output2 \
            google-genai \
            google-api-core \
            proto-plus

      - name: Build macOS app bundle
        run: |
          python build.py mac

      - name: Package macOS app
        run: |
          cd dist
          ditto -c -k --sequesterRsrc --keepParent "MapInABox.app" "MapInABox-macOS.zip"

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: MapInABox-macOS
          path: dist/MapInABox-macOS.zip
          if-no-files-found: error

  publish-release:
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: MapInABox-Windows
          path: artifacts/windows

      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: MapInABox-macOS
          path: artifacts/macos

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/windows/*.exe
            artifacts/macos/*.zip
          generate_release_notes: true
