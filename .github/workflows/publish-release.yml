name: Build and publish release assets

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tools
        shell: powershell
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install pyinstaller wxPython numpy pandas Pillow pygame shapely h3 pyarrow timezonefinder pycountry accessible-output2 google-genai google-api-core proto-plus
          choco install innosetup -y --no-progress

      - name: Build Windows installer
        shell: powershell
        run: |
          python build.py install

      - name: Upload Windows installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: MapInABox-Windows
          path: installer/*.exe
          if-no-files-found: error

  build-macos:
    runs-on: macos-13

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install \
            pyinstaller \
            wxPython \
            numpy \
            pandas \
            Pillow \
            pygame \
            shapely \
            h3 \
            pyarrow \
            timezonefinder \
            pycountry \
            accessible-output2 \
            google-genai \
            google-api-core \
            proto-plus

      - name: Build macOS app bundle
        run: |
          python build.py mac

      - name: Package macOS app
        run: |
          cd dist
          ditto -c -k --sequesterRsrc --keepParent "MapInABox.app" "MapInABox-macOS.zip"

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: MapInABox-macOS
          path: dist/MapInABox-macOS.zip
          if-no-files-found: error

  publish:
    runs-on: ubuntu-latest
    needs:
      - build-windows
      - build-macos

    steps:
      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: MapInABox-Windows
          path: release-assets/windows

      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: MapInABox-macOS
          path: release-assets/macos

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-assets/windows/*.exe
            release-assets/macos/*.zip
